services:
  postgres:
    image: postgres:16-alpine
    container_name: eve-price-compare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eve_price_compare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/realsmurph/eve-price-compare-backend:latest
    container_name: eve-price-compare-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-eve_price_compare}
      GOONMETRICS_STUB_BUY: ${GOONMETRICS_STUB_BUY:-}
      GOONMETRICS_STUB_SELL: ${GOONMETRICS_STUB_SELL:-}
      RUN_STATIC_DATA_LOADER: ${RUN_STATIC_DATA_LOADER:-true}
    ports:
      - "${BACKEND_PORT:-8005}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  frontend:
    image: ghcr.io/realsmurph/eve-price-compare-frontend:latest
    container_name: eve-price-compare-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
